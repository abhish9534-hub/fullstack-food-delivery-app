apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ecommerce
data:
  NODE_ENV: "production"
  DB_HOST: "ecommerce-db"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: ecommerce
type: Opaque
data:
  # Base64 encoded values
  DB_PASSWORD: "cGFzc3dvcmQ=" # 'password'
  API_KEY: "c2VjcmV0LWtleQ==" # 'secret-key'
