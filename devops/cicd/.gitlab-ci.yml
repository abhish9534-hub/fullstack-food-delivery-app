variables:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 123456789012.dkr.ecr.us-east-1.amazonaws.com
  FRONTEND_REPO: ecommerce-frontend
  BACKEND_REPO: ecommerce-backend
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

stages:
  - test
  - security
  - build
  - deploy

linting:
  stage: test
  image: node:20-alpine
  script:
    - npm install
    - npm run lint

sonarqube:
  stage: security
  image: sonarsource/sonar-scanner-cli:latest
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  only:
    - main
    - develop

dependency_scan:
  stage: security
  image: 
    name: owasp/dependency-check:latest
    entrypoint: [""]
  script:
    - /usr/share/dependency-check/bin/dependency-check.sh --project "ecommerce" --scan . --format "HTML"
  artifacts:
    paths:
      - dependency-check-report.html

build_frontend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
    - docker build -t $ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG -f devops/docker/frontend.Dockerfile .
    - docker push $ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG

build_backend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
    - docker build -t $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG -f devops/docker/backend.Dockerfile .
    - docker push $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG

deploy_eks:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - apk add --no-cache aws-cli
    - aws eks update-kubeconfig --region $AWS_REGION --name ecommerce-eks
    - sed -i "s|<IMAGE_TAG>|$IMAGE_TAG|g" devops/k8s/*.yaml
    - kubectl apply -f devops/k8s/
  only:
    - main
